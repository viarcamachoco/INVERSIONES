# FIC: OpenAPI contract for Bollinger Bands endpoint (Edgar, TEAM-02).
openapi: 3.1.0
info:
  title: Indicators Core - Bollinger Bands
  version: 1.0.0
  description: Endpoint REST para Bandas de Bollinger (superior, media, inferior y ancho).
paths:
  /api/indicators/bollinger:
    get:
      summary: Calcula Bandas de Bollinger sobre OHLC del simbolo y timeframe indicados.
      parameters:
        - { in: query, name: symbol, required: true, schema: { type: string }, example: AAPL }
        - { in: query, name: timeframe, required: false, schema: { type: string, enum: [1m, 5m, 15m, 1h, 4h, 1d], default: 1h } }
        - { in: query, name: period, required: false, schema: { type: integer, minimum: 1, maximum: 500, default: 20 } }
        - { in: query, name: stdDev, required: false, schema: { type: number, minimum: 0.1, maximum: 10, default: 2 } }
        - { in: query, name: count, required: false, schema: { type: integer, minimum: 1, maximum: 1000, default: 300 } }
      responses:
        "200":
          description: Resultado Bollinger con serie y valor actual.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BollingerResult" }
        "400": { description: Parametros invalidos, $ref: "#/components/responses/Error" }
        "404": { description: Symbol sin datos OHLC, $ref: "#/components/responses/Error" }
        "422": { description: Datos insuficientes para el periodo, $ref: "#/components/responses/Error" }
components:
  schemas:
    BollingerPoint:
      type: object
      required: [time, upper, middle, lower, bandwidth]
      properties:
        time: { type: integer }
        upper: { type: number, nullable: true }
        middle: { type: number, nullable: true }
        lower: { type: number, nullable: true }
        bandwidth: { type: number, nullable: true }
    BollingerCurrent:
      allOf:
        - $ref: "#/components/schemas/BollingerPoint"
        - type: object
          required: [percent_b]
          properties:
            percent_b: { type: number, nullable: true }
    BollingerResult:
      type: object
      required: [symbol, timeframe, indicator, params, algorithm_version, computed_at, source_input_hash, bars_used, current_value, series, zone]
      properties:
        symbol: { type: string }
        timeframe: { type: string }
        indicator: { type: string, enum: [bollinger] }
        params:
          type: object
          properties:
            period: { type: integer }
            stdDev: { type: number }
        algorithm_version: { type: string }
        computed_at: { type: string, format: date-time }
        source_input_hash: { type: string }
        bars_used: { type: integer }
        current_value: { $ref: "#/components/schemas/BollingerCurrent" }
        series:
          type: array
          items: { $ref: "#/components/schemas/BollingerPoint" }
        zone: { type: string, enum: [above_upper, below_lower, within, unknown] }
    Error:
      type: object
      required: [error_code, message]
      properties:
        error_code: { type: string }
        message: { type: string }
        hint: { type: string }
  responses:
    Error:
      description: Error estructurado
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
